general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300
    on-timeout = brightnessctl -s set 10 & openrgb -p pars-off & razer-cli -e static,0 -c 000000
    on-resume = brightnessctl -r & openrgb -p pars-white & razer-cli -e reactive,4 brightness,25 -c FFFFFF
}

listener {
    timeout = 450
    on-timeout = loginctl lock-session
}

listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r && razer-cli -e reactive,4 brightness,25 -c FFFFFF
}

