# =======================================================
# HYPRLAND ANA YAPILANDIRMA DOSYASI
# =======================================================

# Kaynak Dosyaları
source = ~/.config/hypr/modules/autostart.conf
source = ~/.config/hypr/modules/keybindings.conf
source = ~/.config/hypr/modules/windowrule.conf
source = ~/.config/hypr/modules/env.conf
source = ~/.config/hypr/modules/nvidia.conf
source = ~/.config/hypr/modules/plugins.conf
source = ~/.config/hypr/modules/theme.conf

# =======================================================
# Monitör Yapılandırması
# =======================================================
# monitor = DP-1, 2560x1440@164.84, 0x0, 1
# monitor = DP-1, 2560x1440@164.84, 0x0, 1, bitdepth, 10
# monitor = DP-1, 2560x1440@120, 0x0, 1, bitdepth, 10, cm, wide
# monitor = DP-1, 2560x1440@120, 0x0, 1, bitdepth, 10, cm, hdr, sdrbrightness, 1.4, sdrsaturation, 0.98
monitorv2 {
  output = DP-1
  mode = 2560x1440@120 # 164.84 | 120
  position = 0x0
  scale = 1
  bitdepth = 10
  cm = wide # wide|hdr
  # sdrbrightness = 1.4
  # sdrsaturation = 0.98
}

# =======================================================
# Genel Ayarlar
# =======================================================
general {
  gaps_in = 5
  gaps_out = 10
  border_size = 1
  col.active_border = rgb(b4befe) rgb(f5c2e7) 45deg
  col.inactive_border = rgba(00000000)
  layout = dwindle
  allow_tearing = true
}

# =======================================================
# Dekorasyon (Görsel Efektler)
# =======================================================
decoration {
  rounding = 8
  active_opacity = 1.0
  # inactive_opacity = 0.97
  fullscreen_opacity = 1.0
  dim_inactive = true
  dim_strength = 0.15
  blur {
    enabled = false
    size = 7
    passes = 2
  }
}

# =======================================================
# Animasyonlar
# =======================================================
animations {
  enabled = true

  # Curves
  bezier = outfoxxedExpressive, 0.05, 0.9, 0.1, 1.05
  bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
  bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
  bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
  bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
  bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
  bezier = standardDecel, 0, 0, 0, 1
  bezier = menu_decel, 0.1, 1, 0, 1
  bezier = menu_accel, 0.52, 0.03, 0.72, 0.08

  # Configs
  animation = windowsIn, 1, 5, outfoxxedExpressive, popin 80%
  animation = windowsOut, 1, 3, emphasizedDecel, popin 90%
  animation = windowsMove, 1, 5, outfoxxedExpressive, slide
  animation = border, 1, 10, emphasizedDecel

  animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
  animation = layersOut, 1, 2.4, menu_accel, popin 94%

  animation = fadeLayersIn, 1, 0.5, menu_decel
  animation = fadeLayersOut, 1, 2.7, menu_accel

  animation = workspaces, 1, 6, outfoxxedExpressive, slide

  animation = specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert
  animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
}

# =======================================================
# Düzen (Layout) Ayarları - Dwindle
# =======================================================
dwindle {
  pseudotile = yes
  preserve_split = true
  special_scale_factor = 0.8
}

# =======================================================
# Düzen (Layout) Ayarları - Master
# =======================================================
master {
  new_on_top = true # '1' yerine 'true' kullanıldı.
  mfact = 0.5
}

# =======================================================
# Girdi (Input) Ayarları
# =======================================================
input {
  kb_layout = tr
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =
  numlock_by_default = true

  touchpad {
    natural_scroll = false
    clickfinger_behavior = true
  }
}

# =======================================================
# Hareketler (Gestures)
# =======================================================
# Örnek
# gesture = 3, horizontal, workspace
# gesture = 3, down, mod: ALT, close
# gesture = 3, up, mod: SUPER, scale: 1.5, fullscreen
# gesture = 3, left, scale: 1.5, float

# =======================================================
# Çeşitli (Misc) Ayarlar
# =======================================================
misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
}
