#===========================================================
#  H Y P R L O C K  —  E D I T O R I A L  /  asimetrik tasarım
#  Sola yaslı dev tipografi · tek vurgu rengi · İsviçre ızgarası
#  Vurgu: rgba(180, 190, 254)  (elektrik lavanta)
#  Ölçek: 2560x1440 (scale 1.0) için ayarlandı
#===========================================================

#===========================================================
# GENEL AYARLAR
#===========================================================
general {
  disable_loading_bar = true
  grace = 10
  hide_on_key = false
}

#===========================================================
# ARKA PLAN — koyu, sinematik
#===========================================================
background {
  monitor =
  path = $HOME/.config/hypr/images/wallpaper_symlink
  ignore_empty = true
  blur_passes = 4
  blur_size = 8
  noise = 0.012
  contrast = 0.95
  brightness = 0.55
  vibrancy = 0.15
  vibrancy_darkness = 1.0
}

#===========================================================
# DİKEY VURGU ÇUBUĞU — kompozisyonun sol çapası
#===========================================================
shape {
  monitor =
  size = 8, 400
  color = rgba(180, 190, 254, 0.95)
  rounding = 4
  border_size = 0
  position = 150, 48
  halign = left
  valign = center
}

#===========================================================
# SAAT — dev, ince ağırlık, sola yaslı
#===========================================================
label {
  monitor =
  text = $TIME
  color = rgba(245, 247, 255, 0.97)
  font_size = 172
  font_family = JetBrainsMono NFP Thin
  position = 195, 128
  halign = left
  valign = center

  shadow_passes = 3
  shadow_size = 11
  shadow_color = rgba(0, 0, 0, 0.5)
  shadow_boost = 1.1
}

#===========================================================
# TARİH — büyük harf, kalın, vurgu renginde
#===========================================================
label {
  monitor =
  # Format: 20 ARALIK CUMARTESİ
  text = cmd[update:43200000] echo "$(LC_TIME=tr_TR.UTF-8 date +'%d %B %A' | python3 -c 'import sys; print(sys.stdin.read().strip().upper())')"
  color = rgba(180, 190, 254, 0.95)
  font_size = 25
  font_family = JetBrainsMono NFP ExtraBold
  position = 205, -8
  halign = left
  valign = center

  shadow_passes = 2
  shadow_size = 5
  shadow_color = rgba(0, 0, 0, 0.5)
}

#===========================================================
# İNCE AYIRICI ÇİZGİ
#===========================================================
shape {
  monitor =
  size = 480, 3
  color = rgba(245, 247, 255, 0.18)
  rounding = 0
  border_size = 0
  position = 205, -66
  halign = left
  valign = center
}

#===========================================================
# KULLANICI ADI — küçük, harf aralıklı his
#===========================================================
label {
  monitor =
  text =   $USER
  color = rgba(205, 212, 230, 0.8)
  font_size = 18
  font_family = JetBrainsMono NFP Medium
  position = 205, -110
  halign = left
  valign = center

  shadow_passes = 2
  shadow_size = 4
  shadow_color = rgba(0, 0, 0, 0.45)
}

#===========================================================
# ŞİFRE KUTUSU — modern, sola yaslı, cam efektli
#===========================================================
input-field {
  monitor =
  size = 430, 72
  rounding = 16
  outline_thickness = 3
  dots_size = 0.26
  dots_spacing = 0.3
  dots_center = true

  outer_color = rgba(180, 190, 254, 0.6)
  inner_color = rgba(18, 20, 28, 0.5)
  font_color = rgba(245, 247, 255, 0.92)

  check_color = rgba(166, 218, 149, 0.9)
  fail_color = rgba(237, 135, 150, 0.9)
  fail_text = <i>Hatalı şifre · $ATTEMPTS</i>
  fail_transition = 250

  placeholder_text = <i>›  şifreyi girin</i>
  placeholder_color = rgba(205, 212, 230, 0.4)
  hide_input = false
  fade_on_empty = true
  fade_timeout = 1500

  position = 310, -205
  halign = left
  valign = center

  shadow_passes = 2
  shadow_size = 7
  shadow_color = rgba(0, 0, 0, 0.4)
}

#===========================================================
# HAVA DURUMU — sağ üst köşe, minimal
#===========================================================
label {
  monitor =
  text = cmd[update:1800000] echo "$(~/.config/scripts/weather_locscreen)   ·   ÇANKIRI"
  color = rgba(205, 212, 230, 0.8)
  font_size = 18
  font_family = JetBrainsMono NFP Medium
  position = -75, -64
  halign = right
  valign = top

  shadow_passes = 2
  shadow_size = 4
  shadow_color = rgba(0, 0, 0, 0.45)
}

#===========================================================
# İBN-İ SİNA SÖZÜ — sağ alt köşe, asimetrik blok
#===========================================================
label {
  monitor =
  text = Hayatın kısalığı yüzünden kaygılanma,
  color = rgba(215, 220, 235, 0.7)
  font_size = 16
  font_family = JetBrainsMono NFP Light
  position = -80, 134
  halign = right
  valign = bottom

  shadow_passes = 2
  shadow_size = 4
  shadow_color = rgba(0, 0, 0, 0.4)
}

label {
  monitor =
  text = onu lüzumsuz şeylerle uzatıp uzatmadığına bak.
  color = rgba(215, 220, 235, 0.7)
  font_size = 16
  font_family = JetBrainsMono NFP Light
  position = -80, 104
  halign = right
  valign = bottom

  shadow_passes = 2
  shadow_size = 4
  shadow_color = rgba(0, 0, 0, 0.4)
}

label {
  monitor =
  text = İBN-İ SİNA
  color = rgba(180, 190, 254, 0.9)
  font_size = 16
  font_family = JetBrainsMono NFP ExtraBold
  position = -80, 66
  halign = right
  valign = bottom

  shadow_passes = 2
  shadow_size = 4
  shadow_color = rgba(0, 0, 0, 0.4)
}

#===========================================================
# SAĞ ALT VURGU ÇUBUĞU — sözün altını çizer
#===========================================================
shape {
  monitor =
  size = 95, 5
  color = rgba(180, 190, 254, 0.9)
  rounding = 2
  border_size = 0
  position = -80, 52
  halign = right
  valign = bottom
}
