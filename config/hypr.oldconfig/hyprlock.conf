#===========================================================
# GENEL AYARLAR
#===========================================================
general {
  disable_loading_bar = true
  grace = 10
  hide_on_key = false
}

#===========================================================
# ARKA PLAN AYARLARI
#===========================================================
background {
  monitor =
  path = $HOME/.config/hypr/images/wallpaper_symlink
  ignore_empty = true
  blur_passes = 2
  blur_size = 5
  noise = 0.0117
  contrast = 0.8912
  brightness = 0.8172
  vibrancy = 0.1696
  vibrancy_darkness = 1.0
}

#===========================================================
# SAAT VE TARİH (MERKEZDE)
#===========================================================
label {
  monitor =
  text = $TIME
  color = rgba(240, 240, 240, 1.0)
  font_size = 80
  font_family = Ubuntu Nerd Font Propo Bold
  position = 0, 500
  halign = center
  valign = center
}

label {
  monitor =
  # Tarih Formatı: 20 Aralık Cumartesi
  text = cmd[update:43200000] echo "$(LC_TIME=tr_TR.UTF-8 date +"%d %B %A")"
  color = rgba(200, 200, 200, 0.9)
  font_size = 18
  font_family = Ubuntu Nerd Font Propo
  position = 0, 420
  halign = center
  valign = center
}

#===========================================================
# HAVA DURUMU
#===========================================================
label {
  monitor =
  text = cmd[update:1800000] echo "$(~/.config/scripts/weather_locscreen)"
  color = rgba(240, 240, 240, 0.9)
  font_size = 12
  font_family = Ubuntu Nerd Font Propo
  position = 40, 0
  halign = left
  valign = center
}

#===========================================================
# KULLANICI ADI VE ŞİFRE KUTUSU
#===========================================================
label {
  monitor =
  text = $USER
  color = rgba(200, 200, 200, 1.0)
  font_size = 20
  font_family = Ubuntu Nerd Font Propo Med
  position = 0, 40
  halign = center
  valign = center
}

input-field {
  monitor =
  size = 220, 50
  outline_thickness = 2
  dots_size = 0.33
  dots_spacing = 0.15
  dots_center = true
  outer_color = rgb(151515)
  inner_color = rgb(200, 200, 200)
  font_color = rgb(10, 10, 10)
  fade_on_empty = true
  placeholder_text = <i>Şifreyi girin...</i>
  hide_input = false
  position = 0, -30
  halign = center
  valign = center
}

#===========================================================
# İBN-İ SİNA SÖZÜ (SAĞ ALT)
#===========================================================
label {
  monitor =
  text = Hayatın kısalığı yüzünden kaygılanma, onu
  color = rgba(240, 240, 240, 0.90)
  font_size = 10
  font_family = Ubuntu Nerd Font Propo Light

  # Konum: Merkez üst kısmı
  position = -125, 100
  halign = right
  valign = bottom
}

label {
  monitor =
  text = lüzumsuz şeylerle uzatıp uzatmadığına bak.
  color = rgba(240, 240, 240, 0.90)
  font_size = 10
  font_family = Ubuntu Nerd Font Propo Light

  # Konum: Birinci satırın hemen altında
  position = -100, 80
  halign = right
  valign = bottom
}

label {
  monitor =
  text = İbn-i Sina
  color = rgba(240, 240, 240, 0.90)
  font_size = 14
  font_family = Ubuntu Nerd Font Propo

  # Konum: İkinci satırın altında, hafif sağa kaydırılmış
  position = -50, 50
  halign = right
  valign = bottom
}

#===========================================================
# DEATH STAR
#===========================================================
image {
  monitor =
  path = $HOME/.config/hypr/images/user_icon_symlink
  size = 150
  rounding = -1
  border_size = 4
  border_color = rgb(221, 221, 221)

  position = -300, 0
  halign = center
  valign = center
}
