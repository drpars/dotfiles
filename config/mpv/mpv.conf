LANG=tr_TR.UTF-8
sub-color=#FB8C00
# sub-auto=fuzzy

# ==========================================
# VİDEO AYARLARI (Gelişmiş & Performans)
# ==========================================

# Varsayılan olarak pencereyi ortala ve boyutunu sınırla
geometry=50%:50%
autofit-larger=90%x90%

# Video bitince oynatıcıyı kapatma
keep-open=yes

# Özel arayüz (OSC) kapalı (uosc veya harici widget/scriptler için)
osc=no

# Oynatıcı penceresini her zaman en üstte tut
ontop=yes

# GPU Performans ve Akıcılık Ayarları (Donmayı engellemek için)
vo=gpu
gpu-context=auto
hwdec=auto-safe

# Ekran yenileme hızına (Hz) göre video senkronizasyonu (Yırtılma/Anlık donma engeller)
video-sync=display-resample
interpolation=yes
tscale=oversample

# ==========================================
# SES AYARLARI
# ==========================================
# Sesi otomatik ve güvenli modda miksle
audio-channels=auto-safe

# ==========================================
# ÖNBELLEK (CACHE) AYARLARI
# ==========================================
# Özellikle yüksek kaliteli videolarda disk okuma kaynaklı donmaları engeller
cache=yes
demuxer-max-bytes=500MiB
demuxer-max-back-bytes=100MiB

# ==========================================
# ALTYAZI AYARLARI
# ==========================================
# Altyazılar varsayılan olarak KAPALI başlar ('v' tuşu ile açılabilir)
sid=no

# ==========================================
# PROFILLER
# ==========================================
# İhtiyaç halinde spesifik profiller buraya eklenebilir
